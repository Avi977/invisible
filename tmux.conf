# invisible tmux config — sourced by the `invisible` launcher.
# Keep your own ~/.tmux.conf intact; this loads on top for the invisible session only.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 0
setw -g pane-base-index 0
set -g focus-events on
set -sg escape-time 10

# Prefix: Ctrl-a (invisible session only; doesn't change your global prefix)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Status bar — pane names instead of indices
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=green,bold] invisible #[fg=default]│ #S "
set -g status-right "#[fg=yellow]#(invisible-status 2>/dev/null) #[fg=default]│ %a %Y-%m-%d %H:%M "
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{?pane_title,#{pane_title},#{pane_current_command}} "

# Quick pane jumps — Alt+0..5
bind -n M-0 select-pane -t 0
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5

# Invisible hotkeys (prefix + letter)
bind r run-shell "tmux send-keys -t cockpit:0.5 'invisible-review' Enter"
bind s run-shell "tmux send-keys -t cockpit:0.5 'invisible-standup' Enter"
bind h run-shell "tmux send-keys -t cockpit:0.5 'invisible-health'  Enter"
bind g run-shell "tmux send-keys -t cockpit:0.5 'invisible-gsd' Enter"
# invisible-watch needs a project arg — prompt for it, then send to pane 5.
bind w command-prompt -p "watch project:" "run-shell 'tmux send-keys -t cockpit:0.5 \"invisible-watch %%\" Enter'"
bind L run-shell "tmux send-keys -t cockpit:0.5 'tail -f $INVISIBLE_HOME/logs/orchestrator.log' Enter"

# Reload config in place
bind R source-file ~/.invisible/tmux.conf \; display "invisible tmux.conf reloaded"
